<template>
    <div class={shellClass} style={shellTypographyStyle}>
        <header class="wp-header" style={headerBgStyle}>
            <div class="wp-header-row">
                <div class={avatarRingClass}>
                    <div class="wp-avatar-inner">
                        <template lwc:if={showProfilePhoto}>
                            <img class="wp-avatar-img" src={profilePhotoSrcResolved} alt={profilePhotoAlt} />
                        </template>
                        <template lwc:else>
                            <span>{initials}</span>
                        </template>
                    </div>
                    <span class="wp-tier-pip"></span>
                </div>
                <div class="wp-header-copy">
                    <p class="wp-card-title" style={accentColorStyle}>{cardTitle}</p>
                    <h2 class="wp-name">{fullName}</h2>
                    <p class="wp-meta">{location}</p>
                    <div class="wp-tier-badge">
                        <span class="wp-tier-dot"></span>
                        <span class="wp-tier-text">{tierSegment}</span>
                    </div>
                </div>
                <template lwc:if={showThemeSwitcherResolved}>
                    <div class="wp-theme-switcher">
                        <span class="wp-theme-lbl">Theme</span>
                        <div class="wp-theme-btns">
                            <button
                                type="button"
                                class={themeBtnObsidian}
                                data-theme="obsidian"
                                title="Obsidian"
                                onclick={handleThemeSwitch}
                            >
                                O
                            </button>
                            <button
                                type="button"
                                class={themeBtnMidnight}
                                data-theme="midnight"
                                title="Midnight"
                                onclick={handleThemeSwitch}
                            >
                                M
                            </button>
                            <button
                                type="button"
                                class={themeBtnGraphite}
                                data-theme="graphite"
                                title="Graphite"
                                onclick={handleThemeSwitch}
                            >
                                G
                            </button>
                            <button
                                type="button"
                                class={themeBtnIvory}
                                data-theme="ivory"
                                title="Ivory"
                                onclick={handleThemeSwitch}
                            >
                                I
                            </button>
                        </div>
                    </div>
                </template>
            </div>

            <template lwc:if={showEnrollmentFlagsResolved}>
                <div class="wp-enroll-flags">
                    <template for:each={allEnrollmentFlags} for:item="flag">
                        <span key={flag.flagKey} class={flag.cssClass}>
                            <span class={flag.dotClass}></span>
                            {flag.label}
                            <span class="wp-flag-sep">·</span>
                            <template lwc:if={flag.preserveStatusCase}>
                                <span class="wp-flag-val">{flag.status}</span>
                            </template>
                            <template lwc:else>
                                {flag.status}
                            </template>
                        </span>
                    </template>
                </div>
            </template>

            <template lwc:if={showKpiStripResolved}>
                <div class="wp-kpi-strip">
                    <div class="wp-kpi">
                        <div class="wp-kpi-val">{kpiRevenue}</div>
                        <div class="wp-kpi-lbl">Annual revenue</div>
                        <div class="wp-kpi-delta wp-delta-up">+12% YoY</div>
                    </div>
                    <div class="wp-kpi">
                        <div class="wp-kpi-val">{kpiInvestments}</div>
                        <div class="wp-kpi-lbl">Investments</div>
                        <div class="wp-kpi-delta wp-delta-up">+4.2%</div>
                    </div>
                    <div class="wp-kpi">
                        <div class="wp-kpi-val">{kpiLoan}</div>
                        <div class="wp-kpi-lbl">Lending</div>
                        <div class="wp-kpi-delta wp-delta-dn">−0.8%</div>
                    </div>
                </div>
            </template>
        </header>

        <nav class="wp-tab-bar" role="tablist">
            <template for:each={visibleTabs} for:item="tab">
                <button
                    key={tab.id}
                    type="button"
                    role="tab"
                    class={tab.tabClass}
                    data-tab={tab.id}
                    aria-selected={tab.ariaSelected}
                    onclick={handleTabClick}
                >
                    {tab.label}
                </button>
            </template>
        </nav>

        <template lwc:if={isLoading}>
            <div class="wp-state wp-state--loading">
                <lightning-spinner alternative-text="Loading profile" size="medium"></lightning-spinner>
            </div>
        </template>
        <template lwc:elseif={hasError}>
            <div class="wp-state wp-state--error">
                <p class="wp-error-text">{errorMessage}</p>
            </div>
        </template>
        <template lwc:elseif={hasData}>
            <div class="wp-panel">
                <template lwc:if={isTabOverview}>
                    <div class="wp-contact-card">
                        <span class="wp-section-lbl">Contact</span>
                        <div class="wp-field-rows">
                        <div class="wp-field-row">
                            <span class="wp-field-key">Industry</span>
                            <span class="wp-field-val">{d.industry}</span>
                        </div>
                        <div class="wp-field-row">
                            <span class="wp-field-key">Employees</span>
                            <span class="wp-field-val">{d.employees}</span>
                        </div>
                        <div class="wp-field-row">
                            <span class="wp-field-key">Phone</span>
                            <span class="wp-field-val">{d.phone}</span>
                        </div>
                        <div class="wp-field-row">
                            <span class="wp-field-key">Email</span>
                            <span class="wp-field-val wp-field-val--link">{d.email}</span>
                        </div>
                        <div class="wp-field-row">
                            <span class="wp-field-key">Website</span>
                            <span class="wp-field-val wp-field-val--link">{d.website}</span>
                        </div>
                        </div>
                    </div>
                    <span class="wp-section-lbl">Relationship</span>
                    <div class="wp-field-rows">
                        <div class="wp-field-row">
                            <span class="wp-field-key">Risk profile</span>
                            <span class="wp-field-val wp-field-val--accent">{d.riskProfile}</span>
                        </div>
                        <div class="wp-field-row">
                            <span class="wp-field-key">Customer since</span>
                            <span class="wp-field-val">{displayCustomerSince}</span>
                        </div>
                        <div class="wp-field-row">
                            <span class="wp-field-key">Last interaction</span>
                            <span class="wp-field-val">{displayLastInteractionDate}</span>
                        </div>
                        <div class="wp-field-row">
                            <span class="wp-field-key">Deposits YTD</span>
                            <span class="wp-field-val">{kpiDepositYtd}</span>
                        </div>
                        <div class="wp-field-row">
                            <span class="wp-field-key">Loan limit</span>
                            <span class="wp-field-val">{kpiLoanLimit}</span>
                        </div>
                    </div>
                </template>

                <template lwc:if={isTabSignals}>
                    <div class="wp-rings-grid">
                        <template for:each={signalGaugeSlots} for:item="g">
                            <div key={g.gaugeKey} class="wp-ring-wrap" title={g.title}>
                                <svg viewBox="0 0 72 72" class="wp-ring-svg" aria-hidden="true">
                                    <circle cx="36" cy="36" r="28" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6" />
                                    <template lwc:if={g.showColoredArc}>
                                        <circle
                                            cx="36"
                                            cy="36"
                                            r="28"
                                            fill="none"
                                            stroke={g.stroke}
                                            stroke-width="6"
                                            stroke-dasharray="175.9 175.9"
                                            stroke-dashoffset={g.dashOffset}
                                            transform="rotate(-90 36 36)"
                                            stroke-linecap="round"
                                        />
                                    </template>
                                    <text x="36" y="40" text-anchor="middle" class={g.scoreClass}>{g.centerText}</text>
                                </svg>
                                <span class="wp-ring-lbl">{g.label}</span>
                            </div>
                        </template>
                    </div>
                    <span class="wp-section-lbl">{signalsDetailSectionLabelDisplay}</span>
                    <div class="wp-signal-metrics">
                        <div class="wp-signal-metric-row">
                            <span class="wp-signal-metric-key">Cross-sell score</span>
                            <span class="wp-signal-metric-val">{crossSellScoreDisplay}</span>
                        </div>
                        <div class="wp-signal-metric-row">
                            <span class="wp-signal-metric-key">Savings rate (%)</span>
                            <span class="wp-signal-metric-val">{savingsRateDisplay}</span>
                        </div>
                        <div class="wp-signal-metric-row">
                            <span class="wp-signal-metric-key">Days since last contact</span>
                            <span class={daysSinceLastContactClass}>{daysSinceLastContactDisplay}</span>
                        </div>
                    </div>
                </template>

                <template lwc:if={isTabPortfolio}>
                    <div class="wp-portfolio-row">
                        <div class="wp-donut-wrap">
                            <svg viewBox="0 0 100 100" class="wp-donut-svg">
                                <g transform="translate(50,50)">
                                    <template lwc:if={donutSegSlot0}>
                                        <g transform={donutSegSlot0.transform}>
                                            <circle
                                                r="36"
                                                cx="0"
                                                cy="0"
                                                fill="none"
                                                stroke={donutSegSlot0.color}
                                                stroke-width="14"
                                                stroke-dasharray={donutSegSlot0.dasharray}
                                                stroke-linecap="butt"
                                            />
                                        </g>
                                    </template>
                                    <template lwc:if={donutSegSlot1}>
                                        <g transform={donutSegSlot1.transform}>
                                            <circle
                                                r="36"
                                                cx="0"
                                                cy="0"
                                                fill="none"
                                                stroke={donutSegSlot1.color}
                                                stroke-width="14"
                                                stroke-dasharray={donutSegSlot1.dasharray}
                                                stroke-linecap="butt"
                                            />
                                        </g>
                                    </template>
                                    <template lwc:if={donutSegSlot2}>
                                        <g transform={donutSegSlot2.transform}>
                                            <circle
                                                r="36"
                                                cx="0"
                                                cy="0"
                                                fill="none"
                                                stroke={donutSegSlot2.color}
                                                stroke-width="14"
                                                stroke-dasharray={donutSegSlot2.dasharray}
                                                stroke-linecap="butt"
                                            />
                                        </g>
                                    </template>
                                    <template lwc:if={donutSegSlot3}>
                                        <g transform={donutSegSlot3.transform}>
                                            <circle
                                                r="36"
                                                cx="0"
                                                cy="0"
                                                fill="none"
                                                stroke={donutSegSlot3.color}
                                                stroke-width="14"
                                                stroke-dasharray={donutSegSlot3.dasharray}
                                                stroke-linecap="butt"
                                            />
                                        </g>
                                    </template>
                                </g>
                            </svg>
                            <div class="wp-donut-center">
                                <span class="wp-donut-pct">Alloc.</span>
                                <span class="wp-donut-lbl">Mix</span>
                            </div>
                        </div>
                        <div class="wp-alloc-list">
                            <template for:each={portfolioAllocations} for:item="a">
                                <div key={a.allocKey} class="wp-alloc-item">
                                    <span class="wp-alloc-dot" style={a.dotStyle}></span>
                                    <span class="wp-alloc-name">{a.name}</span>
                                    <span class="wp-alloc-pct">{a.pct}%</span>
                                </div>
                            </template>
                        </div>
                    </div>
                    <span class="wp-section-lbl">Accounts</span>
                    <div class="wp-account-cards">
                        <template for:each={accountCards} for:item="ac">
                            <div key={ac.cardKey} class="wp-account-card">
                                <div>
                                    <div class="wp-account-type">{ac.type}</div>
                                    <div class="wp-account-num">{ac.number}</div>
                                </div>
                                <div class="wp-account-right">
                                    <div class="wp-account-bal">{ac.balance}</div>
                                    <div class={ac.deltaClass}>{ac.delta}</div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <template lwc:if={isTabServices}>
                    <div class="wp-svc-grid">
                        <template for:each={allServiceCards} for:item="svc">
                            <div key={svc.svcKey} class={svc.cardClass}>
                                <div class="wp-svc-head">
                                    <span class={svc.statusClass}>{svc.status}</span>
                                    <template lwc:if={svc.iconTypeMobile}>
                                        <svg class="wp-svc-ico" viewBox="0 0 24 24" aria-hidden="true">
                                            <path
                                                fill="currentColor"
                                                d="M7 2h10a2 2 0 012 2v16a2 2 0 01-2 2H7a2 2 0 01-2-2V4a2 2 0 012-2zm5 18a1 1 0 100-2 1 1 0 000 2z"
                                            />
                                        </svg>
                                    </template>
                                    <template lwc:if={svc.iconTypeWeb}>
                                        <svg class="wp-svc-ico" viewBox="0 0 24 24" aria-hidden="true">
                                            <path
                                                fill="currentColor"
                                                d="M4 5a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 2v8h10V7H7z"
                                            />
                                        </svg>
                                    </template>
                                    <template lwc:if={svc.iconTypeWire}>
                                        <svg class="wp-svc-ico" viewBox="0 0 24 24" aria-hidden="true">
                                            <path
                                                fill="currentColor"
                                                d="M3 12l9-7 9 7h-3v8H6v-8H3zm9 3a2 2 0 100 4 2 2 0 000-4z"
                                            />
                                        </svg>
                                    </template>
                                    <template lwc:if={svc.iconTypeDoc}>
                                        <svg class="wp-svc-ico" viewBox="0 0 24 24" aria-hidden="true">
                                            <path
                                                fill="currentColor"
                                                d="M6 2h8l4 4v14a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2zm7 2v5h5M8 13h8M8 17h6"
                                            />
                                        </svg>
                                    </template>
                                    <template lwc:if={svc.iconTypeBell}>
                                        <svg class="wp-svc-ico" viewBox="0 0 24 24" aria-hidden="true">
                                            <path
                                                fill="currentColor"
                                                d="M12 22a2 2 0 002-2H10a2 2 0 002 2zm6-6V11a6 6 0 10-12 0v5l-2 2v1h16v-1l-2-2z"
                                            />
                                        </svg>
                                    </template>
                                    <template lwc:if={svc.iconTypeShield}>
                                        <svg class="wp-svc-ico" viewBox="0 0 24 24" aria-hidden="true">
                                            <path
                                                fill="currentColor"
                                                d="M12 2l8 4v6c0 5-3.4 9.7-8 11-4.6-1.3-8-6-8-11V6l8-4z"
                                            />
                                        </svg>
                                    </template>
                                </div>
                                <div class="wp-svc-name">{svc.name}</div>
                                <div class="wp-svc-detail">{svc.detail}</div>
                            </div>
                        </template>
                    </div>
                    <span class="wp-section-lbl">Suggested next steps</span>
                    <template for:each={serviceRecommendations} for:item="rec">
                        <div key={rec.recKey} class="wp-ai-action">
                            <div class="wp-ai-action-icon wp-ai-action-icon--gold">
                                <span class="wp-ai-ico-plus">+</span>
                            </div>
                            <div class="wp-ai-action-text">
                                <div class="wp-ai-action-title">{rec.title}</div>
                                <div class="wp-ai-action-sub wp-ai-action-sub--rich">{rec.sub}</div>
                            </div>
                        </div>
                    </template>
                </template>

                <template lwc:if={isTabLocation}>
                    <div class="wp-map-wrap">
                        <template lwc:if={hasMapMarkers}>
                            <lightning-map
                                map-markers={mapMarkers}
                                zoom-level="14"
                                class="wp-lightning-map"
                            ></lightning-map>
                        </template>
                        <template lwc:else>
                            <div class="wp-map-fallback" role="status">
                                <p class="wp-map-fallback-title">Map unavailable</p>
                                <p class="wp-map-fallback-body">
                                    Geocoding tries OpenStreetMap Nominatim (<strong>nominatim.openstreetmap.org</strong>), then Photon
                                    (<strong>photon.komoot.io</strong>) using billing/mailing address, city/state/ZIP, and branch address. Deploy both
                                    Remote Site Settings, or set valid <strong>mapLatitude</strong> / <strong>mapLongitude</strong> from your assembly
                                    Flow (not 0,0). Address fields below still show from profile data.
                                </p>
                            </div>
                        </template>
                    </div>
                    <span class="wp-section-lbl">Address</span>
                    <div class="wp-addr-grid">
                        <div class="wp-addr-cell">
                            <div class="wp-addr-lbl">Street</div>
                            <div class="wp-addr-val">{d.billingStreet}</div>
                        </div>
                        <div class="wp-addr-cell">
                            <div class="wp-addr-lbl">City</div>
                            <div class="wp-addr-val">{d.billingCity}</div>
                        </div>
                        <div class="wp-addr-cell">
                            <div class="wp-addr-lbl">State</div>
                            <div class="wp-addr-val">{d.billingState}</div>
                        </div>
                        <div class="wp-addr-cell">
                            <div class="wp-addr-lbl">Postal</div>
                            <div class="wp-addr-val">{d.billingPostalCode}</div>
                        </div>
                    </div>
                    <template lwc:if={showBranchProximityResolved}>
                        <span class="wp-section-lbl">Branch proximity</span>
                        <div class="wp-branch-list">
                            <template for:each={allBranchCards} for:item="br">
                                <div key={br.rowKey} class={br.cardClass}>
                                    <div class="wp-branch-main">
                                        <div class={br.nameClass}>{br.name}</div>
                                        <div class="wp-branch-detail">{br.detail}</div>
                                        <template lwc:if={br.assigned}>
                                            <span class="wp-assigned-badge">Assigned</span>
                                        </template>
                                    </div>
                                    <div class="wp-branch-aside">
                                        <div class={br.distClass}>{br.dist}</div>
                                        <div class={br.statusClass}>{br.status}</div>
                                        <div class="wp-branch-detail">{br.hours}</div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </template>

                <template lwc:if={isTabInsight}>
                    <div class="wp-ai-header">
                        <span class="wp-ai-pulse"></span>
                        <span class="wp-ai-header-txt">Agentforce insight</span>
                    </div>
                    <div class="wp-insight-card">
                        <div class="wp-pred-label">Predicted focus</div>
                        <div class="wp-pred-value">{predictionLabel}</div>
                        <template lwc:if={summaryLoading}>
                            <lightning-spinner alternative-text="Generating summary" size="small"></lightning-spinner>
                        </template>
                        <template lwc:elseif={summaryError}>
                            <p class="wp-ai-summary wp-ai-summary--err">{summaryError}</p>
                        </template>
                        <template lwc:elseif={summaryText}>
                            <p class="wp-ai-summary">{summaryText}</p>
                        </template>
                        <template lwc:else>
                            <p class="wp-ai-summary">Configure a prompt template to generate a narrative summary.</p>
                        </template>
                    </div>
                    <template lwc:if={showAiActionsResolved}>
                        <section class="wp-improve-section" aria-labelledby="wp-insight-recs-heading">
                            <span id="wp-insight-recs-heading" class="wp-section-lbl">{insightRecommendationsSectionTitleDisplay}</span>
                            <template lwc:if={processedInsightRecommendations.length}>
                                <template for:each={processedInsightRecommendations} for:item="item">
                                    <div key={item.rowKey} class="wp-factor-row">
                                        <span class={item.deltaClass}>{item.formattedPercent}</span>
                                        <div class="wp-bar-track">
                                            <div
                                                class="wp-bar-fill wp-model-bar-fill"
                                                style={item.barStyle}
                                                data-color={item.activeColor}
                                                data-scale={item.barScale}
                                            ></div>
                                        </div>
                                        <span class="wp-factor-label">{item.detail}</span>
                                    </div>
                                </template>
                            </template>
                            <template lwc:else>
                                <p class="wp-lwc-empty">No recommendations returned.</p>
                            </template>
                        </section>
                    </template>
                </template>
            </div>
        </template>
        <template lwc:else>
            <div class="wp-state wp-state--placeholder">
                <p class="wp-placeholder-text">Add this component to an Account or Contact record page and configure the Data graph API name (or rely on SOQL fallback).</p>
            </div>
        </template>
    </div>
</template>
