<template>
    <article class="lwc-shell">
        <div class="lwc-shell__header">
            <h2 class="lwc-shell__title">{mainCardTitleDisplay}</h2>
            <div class="lwc-shell__actions">
                <template lwc:if={showThemeSwitcher}>
                    <div class="pm-theme-switcher">
                        <span class="pm-theme-lbl">Theme</span>
                        <div class="pm-theme-btns">
                            <button
                                type="button"
                                class={themeBtn_obsidian}
                                data-theme="obsidian"
                                onclick={handleThemeSwitch}
                                title="Obsidian"
                            >
                                ◑
                            </button>
                            <button
                                type="button"
                                class={themeBtn_midnight}
                                data-theme="midnight"
                                onclick={handleThemeSwitch}
                                title="Midnight"
                            >
                                ●
                            </button>
                            <button
                                type="button"
                                class={themeBtn_graphite}
                                data-theme="graphite"
                                onclick={handleThemeSwitch}
                                title="Graphite"
                            >
                                ◐
                            </button>
                            <button
                                type="button"
                                class={themeBtn_ivory}
                                data-theme="ivory"
                                onclick={handleThemeSwitch}
                                title="Ivory"
                            >
                                ○
                            </button>
                        </div>
                    </div>
                </template>
                <lightning-button
                    variant="neutral"
                    label="Refresh"
                    onclick={refreshData}
                    disabled={loadingFlow}
                ></lightning-button>
            </div>
        </div>

        <template lwc:if={loadingFlow}>
            <div class="lwc-spinner-wrap">
                <lightning-spinner alternative-text="Loading model output" size="medium"></lightning-spinner>
            </div>
        </template>
        <template lwc:elseif={errorMessage}>
            <p class="lwc-error">{errorMessage}</p>
        </template>
        <template lwc:elseif={hasData}>
            <div class="multiclass-body">
                <div class="class-hero-panel">
                    <div class="class-hero" role="img" aria-label={classHeroAriaLabel}>
                        <template lwc:if={hasPredictionLabel}>
                            <div class="class-hero__label">{predictionLabelDisplay}</div>
                        </template>
                        <template lwc:else>
                            <div class="class-hero__label class-hero__label--empty">—</div>
                        </template>
                        <span class="class-hero__caption">{classSubtitleDisplay}</span>
                    </div>
                </div>

                <section class="improve-section" aria-labelledby="recs-heading">
                    <span id="recs-heading" class="section-label">{recommendationsSectionTitleDisplay}</span>
                    <template lwc:if={processedRecommendations.length}>
                        <template for:each={processedRecommendations} for:item="item">
                            <div key={item.key} class="factor-row">
                                <div class="factor-label-col">
                                    <span class="factor-label-text" title={item.detail}>{item.detail}</span>
                                </div>
                                <div class="diverge-zone">
                                    <div class="diverge-center"></div>
                                    <template lwc:if={item.isPositive}>
                                        <div
                                            class="bar-fill bar-pos"
                                            style={item.barStyle}
                                            data-color={item.activeColor}
                                            data-scale={item.barScale}
                                        ></div>
                                        <span class="bar-val val-pos">{item.formattedPercent}</span>
                                    </template>
                                    <template lwc:else>
                                        <div
                                            class="bar-fill bar-neg"
                                            style={item.barStyle}
                                            data-color={item.activeColor}
                                            data-scale={item.barScale}
                                        ></div>
                                        <span class="bar-val val-neg">{item.formattedPercent}</span>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <div class="diverge-legend" role="presentation">
                            <div class="legend-item">
                                <span class="legend-dot" style={legendSupportsDotStyle}></span>
                                <span>Supports prediction</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-dot" style={legendAgainstDotStyle}></span>
                                <span>Works against</span>
                            </div>
                        </div>
                    </template>
                    <template lwc:else>
                        <p class="lwc-empty">No recommendations returned.</p>
                    </template>
                </section>
            </div>

            <template lwc:if={showSummaryCard}>
                <div class="agent-summary">
                    <template lwc:if={loadingSummary}>
                        <div class="lwc-spinner-wrap lwc-spinner-wrap--small">
                            <lightning-spinner alternative-text="Generating summary" size="small"></lightning-spinner>
                        </div>
                    </template>
                    <template lwc:elseif={summaryError}>
                        <p class="lwc-error lwc-error--summary">{summaryError}</p>
                    </template>
                    <template lwc:elseif={summaryText}>
                        <p class="agent-summary__text">{summaryText}</p>
                    </template>
                </div>
            </template>
        </template>
        <template lwc:else>
            <p class="lwc-placeholder">
                Configure the autolaunched flow API name and place this component on a record page with a valid record
                Id.
            </p>
        </template>
    </article>
</template>
