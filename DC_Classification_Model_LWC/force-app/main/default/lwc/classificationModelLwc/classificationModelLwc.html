<template>
    <article class="lwc-shell">
        <div class="lwc-shell__header">
            <h2 class="lwc-shell__title">{mainCardTitleDisplay}</h2>
            <lightning-button
                variant="neutral"
                label="Refresh"
                onclick={refreshData}
                disabled={loadingFlow}
            ></lightning-button>
        </div>

        <template lwc:if={loadingFlow}>
            <div class="lwc-spinner-wrap">
                <lightning-spinner alternative-text="Loading model output" size="medium"></lightning-spinner>
            </div>
        </template>
        <template lwc:elseif={errorMessage}>
            <p class="lwc-error">{errorMessage}</p>
        </template>
        <template lwc:elseif={hasData}>
            <div class="two-col">
                <div class="gauge-wrap">
                    <svg
                        class="gauge-svg"
                        width="170"
                        height="170"
                        viewBox="0 0 200 200"
                        xmlns="http://www.w3.org/2000/svg"
                        role="img"
                        aria-label={gaugeAriaLabel}
                    >
                        <circle
                            cx="100"
                            cy="100"
                            r="80"
                            fill="none"
                            stroke="#F0F0F0"
                            stroke-width="14"
                        ></circle>
                        <circle
                            class="gauge-arc"
                            cx="100"
                            cy="100"
                            r="80"
                            fill="none"
                            stroke={gaugeArcSolidColor}
                            stroke-width="14"
                            stroke-linecap="round"
                            transform="rotate(-90 100 100)"
                            stroke-dasharray="502"
                            stroke-dashoffset="502"
                        ></circle>
                    </svg>
                    <div class="gauge-label">
                        <template lwc:if={hasPredictionScore}>
                            <div class="gauge-score-line">
                                <span class="score-num">{scorePercentRounded}</span>
                                <span class="score-pct">%</span>
                            </div>
                        </template>
                        <template lwc:else>
                            <div class="gauge-score-line">
                                <span class="score-num score-num--empty">—</span>
                            </div>
                        </template>
                        <span class="score-sub">{gaugeSubtitleDisplay}</span>
                    </div>
                </div>

                <div class="lwc-right-col">
                    <section class="predict-section" aria-labelledby="factors-heading">
                        <span id="factors-heading" class="section-label">{factorsSectionTitleDisplay}</span>
                        <template lwc:if={processedFactors.length}>
                            <template for:each={processedFactors} for:item="item">
                                <div key={item.key} class="factor-row">
                                    <span class={item.deltaClass}>{item.formattedPercent}</span>
                                    <div class="bar-track">
                                        <div
                                            class="bar-fill"
                                            style={item.barStyle}
                                            data-color={item.activeColor}
                                            data-scale={item.barScale}
                                        ></div>
                                    </div>
                                    <span class="factor-label">{item.detail}</span>
                                </div>
                            </template>
                        </template>
                        <template lwc:else>
                            <p class="lwc-empty">No predictors returned.</p>
                        </template>
                    </section>

                    <div class="section-rule" role="presentation"></div>

                    <section class="improve-section" aria-labelledby="recs-heading">
                        <span id="recs-heading" class="section-label">{recommendationsSectionTitleDisplay}</span>
                        <template lwc:if={processedRecommendations.length}>
                            <template for:each={processedRecommendations} for:item="item">
                                <div key={item.key} class="factor-row">
                                    <span class={item.deltaClass}>{item.formattedPercent}</span>
                                    <div class="bar-track">
                                        <div
                                            class="bar-fill"
                                            style={item.barStyle}
                                            data-color={item.activeColor}
                                            data-scale={item.barScale}
                                        ></div>
                                    </div>
                                    <span class="factor-label">{item.detail}</span>
                                </div>
                            </template>
                        </template>
                        <template lwc:else>
                            <p class="lwc-empty">No recommendations returned.</p>
                        </template>
                    </section>
                </div>
            </div>

            <template lwc:if={showSummaryCard}>
                <div class="agent-summary">
                    <template lwc:if={loadingSummary}>
                        <div class="lwc-spinner-wrap lwc-spinner-wrap--small">
                            <lightning-spinner alternative-text="Generating summary" size="small"></lightning-spinner>
                        </div>
                    </template>
                    <template lwc:elseif={summaryError}>
                        <p class="lwc-error lwc-error--summary">{summaryError}</p>
                    </template>
                    <template lwc:elseif={summaryText}>
                        <p class="agent-summary__text">{summaryText}</p>
                    </template>
                </div>
            </template>
        </template>
        <template lwc:else>
            <p class="lwc-placeholder">
                Configure the autolaunched flow API name and place this component on a record page with a valid record
                Id.
            </p>
        </template>
    </article>
</template>
