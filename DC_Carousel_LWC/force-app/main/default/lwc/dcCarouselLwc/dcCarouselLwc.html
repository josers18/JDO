<template>
    <article
        class="dc-carousel slds-card"
        role="region"
        aria-roledescription="carousel"
        aria-label={resolvedTitle}
        onmouseenter={handleMouseEnter}
        onmouseleave={handleMouseLeave}
        onfocusin={handleFocusIn}
        onfocusout={handleFocusOut}
    >
        <template if:true={titleVisible}>
            <div class="slds-card__header slds-grid">
                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                    <div class="slds-media__body">
                        <h2 class="slds-card__header-title">
                            <span class="slds-text-heading_small">{resolvedTitle}</span>
                        </h2>
                    </div>
                </header>
            </div>
        </template>

        <div class="slds-card__body slds-card__body_inner dc-carousel__body">
            <!-- Slot stays in DOM (hidden when JSON fallback is visible) so App Builder can nest LWCs. -->
            <div class="dc-carousel__viewport">
                <div class={compositionTrackClass} style={trackStyle}>
                    <slot onslotchange={handleSlotChange}></slot>
                </div>

                <template if:true={showRichLayer}>
                    <div class="dc-carousel__rich-layer">
                        <div class="dc-carousel__track dc-carousel__track_rich" style={trackStyle} aria-live={ariaLive}>
                            <template for:each={_configuredSlides} for:item="slide">
                                <div
                                    key={slide.key}
                                    class="dc-carousel__panel dc-carousel__panel_rich"
                                    style={richPanelStyle}
                                    role="group"
                                    aria-roledescription="slide"
                                    aria-label={slide.title}
                                >
                                    <h3 class="slds-text-heading_small slds-m-bottom_x-small">{slide.title}</h3>
                                    <lightning-formatted-rich-text value={slide.content}></lightning-formatted-rich-text>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <template if:false={hasSlides}>
                <div class="dc-carousel__empty slds-text-body_regular slds-p-around_medium slds-m-top_small">
                    <p class="slds-m-bottom_small">
                        No slides yet. In Lightning App Builder, <strong>drop components inside this carousel</strong> so
                        each one becomes a slide (for example Prediction Model, Multiclass Prediction, or DC Query to
                        Table).
                    </p>
                    <p class="slds-text-color_weak">
                        If nesting is not available in your page template, set
                        <strong>Fallback slides (JSON)</strong> on this component instead.
                    </p>
                </div>
            </template>

            <template if:true={hasSlides}>
                <template if:true={showChrome}>
                    <div class="dc-carousel__controls slds-grid slds-grid_align-spread slds-m-top_small">
                        <div class="slds-col slds-size_1-of-6">
                            <template if:true={arrowsVisible}>
                                <lightning-button-icon
                                    icon-name="utility:chevronleft"
                                    variant="border-filled"
                                    alternative-text="Previous slide"
                                    title="Previous slide"
                                    onclick={goPrev}
                                    class="dc-carousel__prev"
                                ></lightning-button-icon>
                            </template>
                        </div>
                        <div class="slds-col slds-grow slds-text-align_center">
                            <template if:true={dotsVisible}>
                                <ul class="dc-carousel__indicators slds-list_horizontal" role="tablist">
                                    <template for:each={dotButtons} for:item="dot">
                                        <li key={dot.key} class="slds-item slds-m-horizontal_xx-small" role="presentation">
                                            <button
                                                type="button"
                                                role="tab"
                                                class={dot.className}
                                                aria-selected={dot.ariaSelected}
                                                aria-label={dot.label}
                                                data-index={dot.index}
                                                onclick={handleDotClick}
                                            ></button>
                                        </li>
                                    </template>
                                </ul>
                            </template>
                        </div>
                        <div class="slds-col slds-size_1-of-6 slds-text-align_right">
                            <template if:true={arrowsVisible}>
                                <lightning-button-icon
                                    icon-name="utility:chevronright"
                                    variant="border-filled"
                                    alternative-text="Next slide"
                                    title="Next slide"
                                    onclick={goNext}
                                    class="dc-carousel__next"
                                ></lightning-button-icon>
                            </template>
                        </div>
                    </div>
                </template>
            </template>
        </div>
    </article>
</template>
