<template>
    <article class="dcqt-shell" style={shellStyleString}>
        <div class="dcqt-shell__header">
            <div class="dcqt-shell__title-group">
                <lightning-icon
                    icon-name={resolvedHeaderIconName}
                    size="small"
                    alternative-text=""
                    class="dcqt-shell__icon"
                ></lightning-icon>
                <h2 class="dcqt-shell__title">{resolvedCardTitle}</h2>
            </div>
            <template if:true={loading}>
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </template>
        </div>

        <div class="dcqt-shell__body">
            <template if:true={errorMessage}>
                <div class="dcqt-shell__error slds-text-color_error" role="alert">{errorMessage}</div>
            </template>
            <template if:true={hasGrid}>
                <div class={tableHeightClass}>
                    <lightning-datatable
                        key-field="_rowUid"
                        data={tableRows}
                        columns={tableColumns}
                        hide-checkbox-column={hideSelectionColumn}
                        show-row-number-column={showRowNumberColumn}
                        column-widths-mode={columnWidthsMode}
                        min-column-width={minColumnWidth}
                        resize-column-disabled={resizeColumnDisabled}
                        wrap-table-header={wrapTableHeader}
                        wrap-text-max-lines={wrapTextMaxLines}
                        suppress-bottom-bar={suppressBottomBar}
                        sorted-by={sortedBy}
                        sorted-direction={sortedDirection}
                        onsort={handleSort}
                    >
                    </lightning-datatable>
                </div>
            </template>
        </div>
    </article>
</template>
