<template>
    <lightning-card title={cardTitle} icon-name="utility:table">
        <div class="slds-p-horizontal_small slds-p-bottom_small">
            <div class="dcqt-toolbar slds-grid slds-grid_vertical-align-center slds-wrap slds-gutters_x-small">
                <div class="slds-col slds-grow-none">
                    <lightning-input
                        type="checkbox"
                        label="Run query when page loads"
                        checked={runOnLoad}
                        onchange={handleAutoRunToggle}
                    ></lightning-input>
                </div>
                <template if:true={showRunButton}>
                    <div class="slds-col slds-grow-none">
                        <lightning-button
                            variant="brand"
                            label="Run query"
                            title="Run the Data Cloud SQL configured in App Builder"
                            onclick={handleRun}
                            disabled={loading}
                        ></lightning-button>
                    </div>
                </template>
                <template if:true={loading}>
                    <div class="slds-col slds-grow-none">
                        <lightning-spinner alternative-text="Running query" size="small"></lightning-spinner>
                    </div>
                </template>
            </div>
            <template if:true={errorMessage}>
                <div class="slds-m-top_small slds-text-color_error" role="alert">{errorMessage}</div>
            </template>
            <template if:true={hasTable}>
                <div class={tableHeightClass}>
                    <lightning-datatable
                        key-field="_rowUid"
                        data={tableRows}
                        columns={tableColumns}
                        hide-checkbox-column={hideSelectionColumn}
                        show-row-number-column={showRowNumberColumn}
                        column-widths-mode={columnWidthsMode}
                        min-column-width={minColumnWidth}
                        resize-column-disabled={resizeColumnDisabled}
                        wrap-table-header={wrapTableHeader}
                        wrap-text-max-lines={wrapTextMaxLines}
                        suppress-bottom-bar={suppressBottomBar}
                        sorted-by={sortedBy}
                        sorted-direction={sortedDirection}
                        onsort={handleSort}
                    >
                    </lightning-datatable>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
