    rule:
      type: all_of
      rules:
        - type: text_equals
          field: FinServ_ClientCategory_c__c
          value: "Wealth Management"
        - type: related_to
          dmo: ssot__CampaignMember__dlm
          via: ssot__IndividualId__c
          via_root: ssot__IndividualId__c
          where:
            type: text_equals
            field: ssot__CampaignId__c
            value: "701am00002A9aDdAAJ"

  cmp_wealth_estate_planning_roundtable:
    name: "Wealth Estate Planning Roundtable audience"
    description: "Wealth clients who are members of Campaign HYDRATE-CMP-005"
    persona: wealth
    publish_schedule: daily
