      rules:
        - type: text_equals
          field: FinServ_ClientCategory_c__c
          value: "Retail"
        - type: related_to
          dmo: ssot__CampaignMember__dlm
          via: ssot__IndividualId__c
          via_root: ssot__IndividualId__c
          where:
            type: text_equals
            field: ssot__CampaignId__c
            value: "701am00002A9aDcAAJ"

  cmp_wealth_tax_strategy_webinar:
    name: "Wealth Tax Strategy Webinar 2026 audience"
    description: "Wealth clients who are members of Campaign HYDRATE-CMP-004"
    persona: wealth
    publish_schedule: daily
    target_dmo: ssot__Account__dlm
