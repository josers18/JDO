# Phase 2 segment definitions for Customer_Hydration.
#
# Each entry creates one Data Cloud Segment via the live REST API:
#   POST /services/data/v60.0/ssot/segments
#
# The segment ``developerName`` is deterministic:
#   <ConfigKeyInPascalCase>  (e.g. retail_all -> RetailAll)
# The live API echoes back ``apiName`` in the form ``<DeveloperName>__seg``.
#
# Membership is filtered by External_ID_c__c containing 'MDM' so we
# only match the demo cohort. As of Phase 6 (2026-05-27) the entire
# fleet was renumbered from HYDRATE-* to a sequential MDMP##### /
# MDM##### convention. The MDM TextComparison clause is auto AND-
# injected by the loader (see segments.inject_hydrate_clause), so the
# YAML rule never needs to mention it. Note the segment-injection code
# uses `contains "MDM"` which matches both MDM##### businesses and
# MDMP##### persons.
#
# Verified live against jdo-uqj0jr.
#   target DMO: ssot__Account__dlm  (retargeted from Account_demo__dlm
#       in Phase 2.4 on 2026-05-24 to use the FSC-canonical Account DMO).
#       Five custom fields were PATCH-added to ssot__Account__dlm and
#       new field-mappings created from Account_Home__dll: External_ID_c__c,
#       FinServ_ClientCategory_c__c, PersonBirthdate__c,
#       FinServ_AnnualIncome_pc__c, FinServ_CreditScore_c__c. DC retroactively
#       populated the new fields against existing rows; population matches
#       Account_demo__dlm exactly (24,404 HYDRATE rows, same persona breakdown).
#   field convention: __c -> _c__c, __pc -> _pc__c
#     FinServ__ClientCategory__c -> FinServ_ClientCategory_c__c
#     External_ID__c             -> External_ID_c__c
#     PersonBirthdate            -> PersonBirthdate__c
#
# Hard live constraints (Task 10 smoke discoveries):
#   * segmentType MUST be Dynamic for new segments.
#   * publishSchedule on Dynamic segments must be "NoRefresh". The live
#     API returns "Parameters related to publish aren't supported for
#     a dynamic segments. Remove the parameters and try again." for any
#     other value, so orchestration always sends "NoRefresh" regardless
#     of the publish_schedule field below — that field is INFORMATIONAL
#     ONLY for human readers.
#   * PATCH of Dynamic segments returns ENTITY_SAVE_ERROR. If a segment
#     with the same developerName already exists, we treat it as
#     idempotent success (skip).
#
# Supported rule.type DSL values (translated to DC JSON include criteria):
#   text_equals      -> TextComparison operator "matches" (live equality op)
#   text_contains    -> TextComparison operator "contains"
#   text_in          -> TextComparison operator "in" (values is list)
#   text_has_value   -> TextComparison operator "has value" (no values)
#   number_gt        -> NumberComparison operator "greater than"
#   number_lt        -> NumberComparison operator "less than"
#   number_gte       -> NumberComparison operator "greater than or equal"
#   number_lte       -> NumberComparison operator "less than or equal"
#   number_in_range  -> LogicalComparison.and of two NumberComparisons
#   date_before      -> DateTimeComparison operator "before"
#   date_after       -> DateTimeComparison operator "after"
#   date_in_range    -> LogicalComparison.and of two DateTimeComparisons
#   age_gte          -> ExactlyRelativeDateComparison "before" -N years
#                       *** KNOWN BROKEN on Profile DMOs in v62.0 ***
#                       Use date_before with frozen anchor instead.
#   age_lte          -> ExactlyRelativeDateComparison "after"  -N years
#                       *** KNOWN BROKEN on Profile DMOs in v62.0 ***
#                       Use date_after with frozen anchor instead.
#   age_in_range     -> LogicalComparison.and of two ExactlyRelativeDateComparisons.
#                       *** KNOWN BROKEN on Profile DMOs in v62.0 ***
#                       Live probe (2026-05-25): both `before -55y` and
#                       `after -55y` returned identical 410-row counts,
#                       proving the filter is being ignored or evaluated
#                       against an unrelated reference. Use date_in_range
#                       with frozen anchors instead, bumped annually.
#                       The translator code stays in segments.py for the
#                       day relative-date filters work correctly.
#   all_of           -> Compound rule: AND of a non-empty `rules:` sub-list.
#                       Each sub-rule is itself a rule (atomic OR another
#                       all_of/any_of for nesting). A single sub-rule
#                       passes through without an extra LogicalComparison
#                       wrapper.
#   any_of           -> Compound rule: OR of a non-empty `rules:` sub-list.
#                       Same shape as all_of, different operator.
#
# Many of the original 20 segments cross-referenced DMOs we have NOT
# hydrated yet (Mortgage, HELOC, LifeEvent, CampaignMember). For those,
# we collapse to a HYDRATE-only filter scoped to the persona via
# FinServ_ClientCategory_c__c. The HYDRATE-* clause (auto-injected)
# guarantees we never accidentally match the org's 178 pre-existing
# seed accounts. This is intentional and documented in
# docs/SEGMENTS_PHASE_2.md.

segments:

  # ----- 4 persona base segments -----

  retail_all:
    name: "Retail Customers"
    description: "All hydrated retail Person Account customers"
    persona: retail
    publish_schedule: hourly
    target_dmo: ssot__Account__dlm
    rule:
      type: text_equals
      field: FinServ_ClientCategory_c__c
      value: "Retail"

  wealth_all:
    name: "Wealth Management Clients"
    description: "All hydrated wealth Person Account customers"
    persona: wealth
    publish_schedule: hourly
    target_dmo: ssot__Account__dlm
    rule:
      type: text_equals
      field: FinServ_ClientCategory_c__c
      value: "Wealth Management"

  smb_all:
    name: "Small Business Clients"
    description: "All hydrated SMB business Account customers"
    persona: smb
    publish_schedule: daily
    target_dmo: ssot__Account__dlm
    rule:
      type: text_equals
      field: FinServ_ClientCategory_c__c
      value: "Small Business"

  commercial_all:
    name: "Commercial Banking Clients"
    description: "All hydrated commercial business Account customers"
    persona: commercial
    publish_schedule: daily
    target_dmo: ssot__Account__dlm
    rule:
      type: text_equals
      field: FinServ_ClientCategory_c__c
      value: "Commercial Banking"

  household_all:
    name: "Household Customers"
    description: "All hydrated household-tier Person Account customers"
    persona: household
    publish_schedule: hourly
    target_dmo: ssot__Account__dlm
    rule:
      type: text_equals
      field: FinServ_ClientCategory_c__c
      value: "Household"

  # ----- 6 lifecycle / sub-segments -----
  #
  # WealthPreRetiree uses frozen birthdate anchors (date_in_range) for
  # the 55-65 pre-retirement window. age_in_range / ExactlyRelativeDateComparison
  # was attempted in Phase 2.2/2.3 but its semantics are broken on
  # Profile-category DMOs in v62.0 (live probe: identical 410-row count
  # for "before -55y" and "after -55y" — operator was being ignored).
  # See dc-connect-api skill "Known endpoint quirks → Segments" for details.
  #
  # Maintenance: bump after / before by one year each January as the
  # demo year advances:
  #   2026 → after 1961-01-01 / before 1971-01-01  (ages 55-65 in 2026)
  #   2027 → after 1962-01-01 / before 1972-01-01
  #   2028 → after 1963-01-01 / before 1973-01-01
  #   ...
  # Last bumped: 2026-05-25 for demo year 2026.

  wealth_pre_retiree:
    name: "Wealth Pre-Retirees (55-65)"
    description: "Wealth Management clients aged 55-65 (pre-retirement window) — frozen DOB anchors, bump annually"
    persona: wealth
    publish_schedule: daily
    target_dmo: ssot__Account__dlm
    rule:
      type: all_of
      rules:
        - type: text_equals
          field: FinServ_ClientCategory_c__c
          value: "Wealth Management"
        - type: date_in_range
          field: PersonBirthdate__c
          after: "1961-01-01"
          before: "1971-01-01"

  retail_family_with_mortgage:
    name: "Retail Family-Building with Mortgage"
    description: "Retail customers with at least one Loan-type FinancialAccount (Phase 3d v1.2: org has no Mortgage sub-type, segments on Loans bucket)"
    persona: retail
    publish_schedule: daily
    target_dmo: ssot__Account__dlm
    rule:
      type: all_of
      rules:
        - type: text_equals
          field: FinServ_ClientCategory_c__c
          value: "Retail"
        - type: related_to
          dmo: ssot__FinancialAccount__dlm
          via: CustomerID__c
          where:
            type: text_equals
            field: ssot__FinancialAccountType__c
            value: "Loans"

  retail_heloc_drawn:
    name: "Retail HELOC Drawn 50%+"
    description: "Retail customers with a Loan FinancialAccount whose name contains HELOC (Phase 3d v1.2: live data has no Drawn_Ratio field)"
    persona: retail
    publish_schedule: daily
    target_dmo: ssot__Account__dlm
    linked_campaign: HYDRATE-CMP-001
    rule:
      type: all_of
      rules:
        - type: text_equals
          field: FinServ_ClientCategory_c__c
          value: "Retail"
        - type: related_to
          dmo: ssot__FinancialAccount__dlm
          via: CustomerID__c
          where:
            type: all_of
            rules:
              - type: text_equals
                field: ssot__FinancialAccountType__c
                value: "Loans"
              - type: text_contains
                field: ssot__Name__c
                value: "HELOC"

  smb_with_sba:
    name: "SMB Owners with SBA Loan"
    description: "SMB clients with a Loan FinancialAccount whose name contains SBA"
    persona: smb
    publish_schedule: daily
    target_dmo: ssot__Account__dlm
    rule:
      type: all_of
      rules:
        - type: text_equals
          field: FinServ_ClientCategory_c__c
          value: "Small Business"
        - type: related_to
          dmo: ssot__FinancialAccount__dlm
          via: CustomerID__c
          where:
            type: all_of
            rules:
              - type: text_equals
                field: ssot__FinancialAccountType__c
                value: "Loans"
              - type: text_contains
                field: ssot__Name__c
                value: "SBA"

  commercial_with_treasury:
    name: "Commercial with Treasury Services"
    description: "Commercial banking clients with at least one Treasury Management FinancialAccount"
    persona: commercial
    publish_schedule: daily
    target_dmo: ssot__Account__dlm
    rule:
      type: all_of
      rules:
        - type: text_equals
          field: FinServ_ClientCategory_c__c
          value: "Commercial Banking"
        - type: related_to
          dmo: ssot__FinancialAccount__dlm
          via: CustomerID__c
          where:
            type: text_equals
            field: ssot__FinancialAccountType__c
            value: "Treasury Management"

  wealth_recent_life_event:
    name: "Wealth with Recent Life Event (90d)"
    description: "Wealth clients with a PersonLifeEvent in the last 90 days (frozen 90d anchor; refresh weekly via probe)"
    persona: wealth
    publish_schedule: daily
    target_dmo: ssot__Account__dlm
    rule:
      type: all_of
      rules:
        - type: text_equals
          field: FinServ_ClientCategory_c__c
          value: "Wealth Management"
        - type: related_to
          dmo: ssot__PersonLifeEvent__dlm
          via: ssot__IndividualId__c
          via_root: ssot__IndividualId__c
          where:
            type: relative_date_after_days
            field: ssot__PersonLifeEventDateTime__c
            days: 90

  # ----- 10 campaign-aligned segments -----
  #
  # Phase 3d v1.2: CampaignMember DMO is now hydrated. Each segment AND-joins
  # the persona filter with a NumberAggregation count(>=1) on
  # ssot__CampaignMember__dlm filtering by ssot__CampaignId__c. Person-rooted
  # personas (retail / wealth / smb in this org) join via
  # Account.IndividualId = CampaignMember.IndividualId. Business-rooted
  # (commercial) join via Account.Id = CampaignMember.BusinessAccountId.
  # The HYDRATE-CMP-NNN External_ID is resolved to the live SF Campaign
  # 18-char Id at YAML-author time (see v1.1 §2.3 + v1.2 spec). The
  # linked_campaign field stays as informational metadata for downstream
  # activations.

  cmp_heloc_refi_outreach:
    name: "HELOC Refi Outreach Q2 audience"
    description: "Retail customers who are members of Campaign HYDRATE-CMP-001"
    persona: retail
    publish_schedule: daily
    target_dmo: ssot__Account__dlm
    linked_campaign: HYDRATE-CMP-001
    rule:
      type: all_of
      rules:
        - type: text_equals
          field: FinServ_ClientCategory_c__c
          value: "Retail"
        - type: related_to
          dmo: ssot__CampaignMember__dlm
          via: ssot__IndividualId__c
          via_root: ssot__IndividualId__c
          where:
            type: text_equals
            field: ssot__CampaignId__c
            value: "701am00002A9aDaAAJ"

