# Phase 2 segment definitions for Customer_Hydration.
#
# Each entry creates one Data Cloud Segment via the live REST API:
#   POST /services/data/v60.0/ssot/segments
#
# The segment ``developerName`` is deterministic:
#   <ConfigKeyInPascalCase>  (e.g. retail_all -> RetailAll)
# The live API echoes back ``apiName`` in the form ``<DeveloperName>__seg``.
#
# Membership is filtered by External_ID_c__c containing 'HYDRATE-' so we
# only match hydrated demo accounts (not the 178 pre-existing seed
# accounts on the org). The HYDRATE-* TextComparison clause is auto
# AND-injected by the loader (see segments.inject_hydrate_clause), so
# the YAML rule never needs to mention it.
#
# Verified live against jdo-uqj0jr on 2026-05-22.
#   target DMO: Account_demo__dlm
#   field convention: __c -> _c__c, __pc -> _pc__c
#     FinServ__ClientCategory__c -> FinServ_ClientCategory_c__c
#     External_ID__c             -> External_ID_c__c
#     PersonBirthdate            -> PersonBirthdate__c
#
# Hard live constraints (Task 10 smoke discoveries):
#   * segmentType MUST be Dynamic for new segments.
#   * publishSchedule must be one of: NoRefresh|One|Two|Four|Six|Twelve|TwentyFour
#       Mapping at call time:
#         manual  -> NoRefresh
#         hourly  -> One
#         daily   -> TwentyFour
#         weekly  -> TwentyFour  (no native weekly slot; closest available)
#   * PATCH of Dynamic segments returns ENTITY_SAVE_ERROR. If a segment
#     with the same developerName already exists, we treat it as
#     idempotent success (skip).
#
# Supported rule.type DSL values (translated to DC JSON include criteria):
#   text_equals      -> TextComparison operator "equals"
#   text_contains    -> TextComparison operator "contains"
#   text_in          -> TextComparison operator "in" (values is list)
#   text_has_value   -> TextComparison operator "has value" (no values)
#   number_gt        -> NumberComparison operator "greater than"
#   number_lt        -> NumberComparison operator "less than"
#   number_gte       -> NumberComparison operator "greater than or equal"
#   number_lte       -> NumberComparison operator "less than or equal"
#   number_in_range  -> LogicalComparison.and of two NumberComparisons
#   date_before      -> DateTimeComparison operator "before"
#   date_after       -> DateTimeComparison operator "after"
#   date_in_range    -> LogicalComparison.and of two DateTimeComparisons
#
# Many of the original 20 segments cross-referenced DMOs we have NOT
# hydrated yet (Mortgage, HELOC, LifeEvent, CampaignMember). For those,
# we collapse to a HYDRATE-only filter scoped to the persona via
# FinServ_ClientCategory_c__c. The HYDRATE-* clause (auto-injected)
# guarantees we never accidentally match the org's 178 pre-existing
# seed accounts. This is intentional and documented in
# docs/SEGMENTS_PHASE_2.md.

segments:

  # ----- 4 persona base segments -----

  retail_all:
    name: "Retail Customers"
    description: "All hydrated retail Person Account customers"
    persona: retail
    publish_schedule: hourly
    target_dmo: Account_demo__dlm
    rule:
      type: text_equals
      field: FinServ_ClientCategory_c__c
      value: "Retail"

  wealth_all:
    name: "Wealth Management Clients"
    description: "All hydrated wealth Person Account customers"
    persona: wealth
    publish_schedule: hourly
    target_dmo: Account_demo__dlm
    rule:
      type: text_equals
      field: FinServ_ClientCategory_c__c
      value: "Wealth"

  smb_all:
    name: "Small Business Clients"
    description: "All hydrated SMB business Account customers"
    persona: smb
    publish_schedule: daily
    target_dmo: Account_demo__dlm
    rule:
      type: text_equals
      field: FinServ_ClientCategory_c__c
      value: "Small Business"

  commercial_all:
    name: "Commercial Banking Clients"
    description: "All hydrated commercial business Account customers"
    persona: commercial
    publish_schedule: daily
    target_dmo: Account_demo__dlm
    rule:
      type: text_equals
      field: FinServ_ClientCategory_c__c
      value: "Commercial"

  # ----- 6 lifecycle / sub-segments -----
  #
  # Pre-retiree window: ages 55-65 -> birthdates between (today-65y) and
  # (today-55y). The literal anchor dates 1961-01-01 / 1971-01-01 are
  # close enough for the demo data and avoid a CURRENT_DATE() function
  # call which the DC DSL does not support inline.

  wealth_pre_retiree:
    name: "Wealth Pre-Retirees (55-65)"
    description: "Wealth Management clients born 1961-1971 (pre-retirement window)"
    persona: wealth
    publish_schedule: daily
    target_dmo: Account_demo__dlm
    rule:
      type: date_in_range
      field: PersonBirthdate__c
      after: "1961-01-01"
      before: "1971-01-01"

  retail_family_with_mortgage:
    name: "Retail Family-Building with Mortgage"
    description: "Retail customers (placeholder until Mortgage DMO hydrated)"
    persona: retail
    publish_schedule: daily
    target_dmo: Account_demo__dlm
